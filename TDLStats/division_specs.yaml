#
# Notes:
# - Keep `id` stable once we start using it in the app/API.
# - Put the official TDL team spelling in `canonical_name`.
# - Add any alternate spellings seen in box scores under `aliases`.
# - Leave unknown values as "" for now.

project:
  season: 2026
  player_identity_scope: season_division_name
  notes:
    - "Temporary player identity assumption: normalized name is unique within a season+division."
    - "If two players share a name in one division, we will need a stronger player key."

